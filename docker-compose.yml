version: '3.9'

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: choice-poll-api
    restart: unless-stopped
    environment:
      PORT: 3000
      FRONTEND_URL: "http://localhost,https://yourdomain.com"
      DB_PATH: /data/poll.db
    volumes:
      - poll-data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (built, served by nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: choice-poll-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  poll-data:
